# GitHub Actions workflow for scheduled execution
# Place this file in .github/workflows/daily_discovery.yml

name: Daily Client Discovery

on:
  schedule:
    # Run at 2:30 AM UTC (8:00 AM IST) Monday to Friday
    - cron: '30 2 * * 1-5'
  workflow_dispatch: # Allow manual triggering

jobs:
  discover_clients:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create credentials file
      run: |
        mkdir -p credentials
        echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > credentials/google_service_account.json
    
    - name: Set up environment variables
      run: |
        echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> $GITHUB_ENV
        echo "GOOGLE_SHEETS_ID=${{ secrets.GOOGLE_SHEETS_ID }}" >> $GITHUB_ENV
        echo "GOOGLE_SHEETS_CREDENTIALS_PATH=credentials/google_service_account.json" >> $GITHUB_ENV
        echo "ENVIRONMENT=production" >> $GITHUB_ENV
    
    - name: Run daily discovery
      run: |
        python -m scheduler.daily_runner test
    
    - name: Upload logs (if needed)
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: discovery-logs
        path: logs/
        retention-days: 7